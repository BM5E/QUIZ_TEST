{% extends "base.html" %}

{% block title %}BookQuiz - Forgot Password{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card shadow-sm">
            <div class="card-header bg-dark">
                <h4 class="mb-0">Forgot Password</h4>
            </div>
            <div class="card-body">
                <p class="mb-4">Enter your email address below and we'll help you reset your password.</p>
                
                <form method="POST" action="{{ url_for('auth.forgot_password') }}">
                    <div class="mb-3">
                        <label for="email" class="form-label">Email Address</label>
                        <input type="email" class="form-control" id="email" name="email" required>
                    </div>
                    
                    <div class="d-grid">
                        <button type="submit" class="btn btn-primary">Continue</button>
                    </div>
                </form>
                
                <hr>
                
                <div class="text-center">
                    <p>Remember your password? <a href="{{ url_for('auth.login') }}">Log in here</a></p>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
