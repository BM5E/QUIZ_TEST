{% extends "base.html" %}

{% block title %}BookQuiz - Verify Security Questions{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card shadow-sm">
            <div class="card-header bg-dark">
                <h4 class="mb-0">Verify Your Identity</h4>
            </div>
            <div class="card-body">
                <p class="mb-4">Please answer your security questions to reset your password.</p>
                
                <form method="POST" action="{{ url_for('auth.verify_security_questions') }}">
                    {% for i in range(security_questions|length) %}
                        <div class="mb-3">
                            <label for="answer{{ i+1 }}" class="form-label">{{ security_questions[i].question }}</label>
                            <input type="text" class="form-control" id="answer{{ i+1 }}" name="answer{{ i+1 }}" required>
                        </div>
                    {% endfor %}
                    
                    <div class="d-grid">
                        <button type="submit" class="btn btn-primary">Verify</button>
                    </div>
                </form>
                
                <hr>
                
                <div class="text-center">
                    <p><a href="{{ url_for('auth.forgot_password') }}">Try a different email</a></p>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
